spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  application:
    name: retrouvid-backend
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB
  # Spring Boot autoconfig Redis refuse un host vide. On l'exclut par défaut
  # et on gère la création du bean nous-mêmes dans RedisConfig quand REDIS_HOST
  # est renseigné (cf. @ConditionalOnProperty).
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/retrouvid}
    username: ${DB_USER:retrouvid}
    password: ${DB_PASSWORD:retrouvid}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB

app:
  password-reset:
    expose-token: ${PASSWORD_RESET_EXPOSE_TOKEN:true}
  otp:
    expose-code: ${OTP_EXPOSE_CODE:false}
  mail:
    from: ${MAIL_FROM:no-reply@retrouvid.local}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    first-name: ${ADMIN_FIRST_NAME:Admin}
    last-name: ${ADMIN_LAST_NAME:RetrouvID}
  onesignal:
    app-id: ${ONESIGNAL_APP_ID:}
    rest-api-key: ${ONESIGNAL_REST_API_KEY:}
  media:
    storage-path: ${MEDIA_PATH:./storage/media}
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-change-me-please-1234}
    access-expiration-minutes: 15
    refresh-expiration-days: 7
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
