spring:
  datasource:
    url: jdbc:h2:mem:retrouvid;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.globally_quoted_identifiers: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  media:
    storage-path: ./target/test-media
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret-12345
    access-expiration-minutes: 15
    refresh-expiration-days: 7
  cors:
    allowed-origins: http://localhost:3000
  otp:
    expose-code: true
